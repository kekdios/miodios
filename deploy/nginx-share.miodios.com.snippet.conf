# Append this ENTIRE file to the END of:
#   /etc/nginx/sites-available/prayer
# on the droplet (same file certbot already edited for miodios.com).
#
# Then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires Node photo-share listening on 127.0.0.1:4100.
# Cert must include share.miodios.com (SAN on miodios.com fullchain.pem).

# HTTP → HTTPS for share subdomain
server {
    listen 80;
    listen [::]:80;
    server_name share.miodios.com;
    return 301 https://$host$request_uri;
}

# HTTPS → photo-share API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name share.miodios.com;

    ssl_certificate     /etc/letsencrypt/live/miodios.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miodios.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 512M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
