name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            # If SSH user is root but the repo is owned by deploy, git 2.35+ refuses without this:
            git config --global --add safe.directory /opt/prayer
            cd /opt/prayer
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy/update-app.sh 2>/dev/null || true
            SKIP_GIT=1 bash deploy/update-app.sh
